<nav class="menu-text">
    {% for item in site.data.navigation %}
        {% if forloop.index == 1 %}
            <a class="home-link" href="{{ item.link }}"><img src="/assets/img/favicon.png" alt="accueil"/></a>
        {% else %}
            <a href="{{ item.link }}">{{ item.name }}</a>
        {% endif %}
    {% endfor %}
</nav>
